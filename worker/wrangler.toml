name = "skola-state"
main = "worker.js"
compatibility_date = "2024-09-01"

# ALLOW_ORIGIN omezuje CORS jen na naši stránku
[vars]
ALLOW_ORIGIN = "https://dinkotom.github.io"
GH_REPO = "dinkotom/sk-9baf2357"
GH_WORKFLOW = "build.yml"

# Spolehlivé spouštění buildu (náhrada za nespolehlivý GitHub cron).
# Pokrývá 6:00 i 17:00 Praha v létě (UTC+2) i v zimě (UTC+1); worker pak
# dispatchne build jen v cílové hodiny (viz scheduled() ve worker.js).
[triggers]
crons = ["0 4,5,15,16 * * *"]

# KV namespace — id doplň podle výstupu `wrangler kv namespace create STATE`
[[kv_namespaces]]
binding = "KV"
id = "87395cbadd1d4b3b9abaa4a5840daf93"
